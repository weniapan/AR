<!doctype html>
<html lang="en">
  <head>
    <title>&lt;soccer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="soccer_ball.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" scale="0.06 0.06 0.06" auto-rotate>
      <button class="Hotspot" slot="hotspot-1" data-position="-0.0006346389106636788m 0.012317761489623155m 0.2649653654897668m" data-normal="-0.1678995486348148m 0.17254600391981473m 0.9705862239386713m" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">足球</div>
      </button>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
  </body>
</html>
